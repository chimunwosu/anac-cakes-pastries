<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A44C;stop-opacity:1"/>
      <stop offset="50%" style="stop-color:#F0D27C;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#C4943C;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="goldDark" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C4943C;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#9A7430;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="600" height="800" fill="#1A1A2E"/>

  <!-- Outer gold frame -->
  <rect x="25" y="25" width="550" height="750" rx="8" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.4"/>

  <!-- ══════════════════════════════════════ -->
  <!--       STACKED MONOGRAM: A N A C       -->
  <!-- ══════════════════════════════════════ -->

  <!-- ── Letter A (First - Top) ── -->
  <polygon points="255,70 300,190 272,190 218,70" fill="url(#gold)"/>
  <polygon points="345,70 382,70 328,190 300,190" fill="url(#gold)"/>
  <polygon points="300,50 320,70 280,70" fill="url(#gold)"/>
  <polygon points="280,70 300,50 255,70" fill="url(#gold)"/>
  <polygon points="300,50 320,70 345,70" fill="url(#gold)"/>
  <rect x="252" y="135" width="96" height="14" rx="2" fill="url(#gold)"/>
  <polygon points="300,78 270,150 330,150" fill="#1A1A2E"/>
  <polygon points="300,78 270,135 330,135" fill="#1A1A2E"/>

  <!-- Dots between A and N -->
  <circle cx="270" cy="205" r="2.5" fill="url(#gold)" opacity="0.5"/>
  <circle cx="300" cy="205" r="3" fill="url(#gold)" opacity="0.7"/>
  <circle cx="330" cy="205" r="2.5" fill="url(#gold)" opacity="0.5"/>

  <!-- ── Letter N (Second) ── -->
  <rect x="218" y="220" width="24" height="115" fill="url(#gold)"/>
  <rect x="358" y="220" width="24" height="115" fill="url(#gold)"/>
  <polygon points="218,220 242,220 382,335 358,335" fill="url(#gold)"/>
  <polygon points="223,228 242,228 377,328 360,328" fill="url(#goldDark)" opacity="0.3"/>

  <!-- Dots between N and A -->
  <circle cx="270" cy="350" r="2.5" fill="url(#gold)" opacity="0.5"/>
  <circle cx="300" cy="350" r="3" fill="url(#gold)" opacity="0.7"/>
  <circle cx="330" cy="350" r="2.5" fill="url(#gold)" opacity="0.5"/>

  <!-- ── Letter A (Third) ── -->
  <polygon points="255,365 300,485 272,485 218,365" fill="url(#gold)"/>
  <polygon points="345,365 382,365 328,485 300,485" fill="url(#gold)"/>
  <polygon points="300,345 320,365 280,365" fill="url(#gold)"/>
  <polygon points="280,365 300,345 255,365" fill="url(#gold)"/>
  <polygon points="300,345 320,365 345,365" fill="url(#gold)"/>
  <rect x="252" y="430" width="96" height="14" rx="2" fill="url(#gold)"/>
  <polygon points="300,373 270,445 330,445" fill="#1A1A2E"/>
  <polygon points="300,373 270,430 330,430" fill="#1A1A2E"/>

  <!-- Dots between A and C -->
  <circle cx="270" cy="500" r="2.5" fill="url(#gold)" opacity="0.5"/>
  <circle cx="300" cy="500" r="3" fill="url(#gold)" opacity="0.7"/>
  <circle cx="330" cy="500" r="2.5" fill="url(#gold)" opacity="0.5"/>

  <!-- ── Letter C (Bottom) ── -->
  <path d="M365,555
           C365,515 338,500 300,500
           C250,500 225,528 225,568
           C225,608 250,636 300,636
           C338,636 365,621 365,581"
        fill="none" stroke="url(#gold)" stroke-width="26" stroke-linecap="round"/>
  <rect x="350" y="540" width="50" height="55" fill="#1A1A2E"/>

  <!-- ══════════════════════════════════════ -->
  <!--            BRAND TEXT                  -->
  <!-- ══════════════════════════════════════ -->

  <!-- Decorative line -->
  <line x1="140" y1="680" x2="250" y2="680" stroke="url(#gold)" stroke-width="0.8" opacity="0.5"/>
  <circle cx="265" cy="680" r="2.5" fill="url(#gold)" opacity="0.6"/>
  <circle cx="300" cy="680" r="3.5" fill="url(#gold)" opacity="0.8"/>
  <circle cx="335" cy="680" r="2.5" fill="url(#gold)" opacity="0.6"/>
  <line x1="350" y1="680" x2="460" y2="680" stroke="url(#gold)" stroke-width="0.8" opacity="0.5"/>

  <!-- Brand name -->
  <text x="300" y="715" text-anchor="middle" font-family="Georgia, 'Palatino Linotype', serif" font-size="22" fill="url(#gold)" letter-spacing="10" opacity="0.9">CAKES &amp; PASTRIES</text>

  <!-- Tagline -->
  <text x="300" y="750" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#F0D27C" letter-spacing="4" opacity="0.5">EST. 2012 ~ OWERRI, NIGERIA</text>

</svg>